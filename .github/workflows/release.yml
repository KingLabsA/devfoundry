name: release

# Builds native desktop bundles for macOS, Windows, and Linux from the one Tauri codebase.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest      # -> .app + .dmg (Apple Silicon + Intel)
            args: "--target universal-apple-darwin"
          - platform: windows-latest    # -> .msi + .exe (NSIS)
            args: ""
          - platform: ubuntu-22.04       # -> .deb + .AppImage
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: actions/setup-node@v4
        with: { node-version: 22 }

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install frontend deps
        run: cd frontend && npm ci

      - name: Verify icons exist (Windows debug)
        if: matrix.platform == 'windows-latest'
        run: |
          dir "frontend\src-tauri\icons\" | findstr ".ico"
          if not exist "frontend\src-tauri\icons\icon.ico" (
            echo Icon file not found!
            exit /b 1
          )
        shell: cmd

      - name: Build desktop app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Tauri updater signing (set) — signs the updater artifacts.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # --- macOS Developer ID signing + notarization ---
          # Uncomment and add the repo secrets when you have an Apple Developer ID cert
          # (see docs/SIGNING.md). Until then macOS builds are ad-hoc signed.
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: frontend
          args: ${{ matrix.args }}
          tagName: ${{ github.ref_name }}
          releaseName: "DevFoundry ${{ github.ref_name }}"
          releaseDraft: false
          releaseBody: "Native desktop builds for macOS, Windows, and Linux. See CHANGELOG.md."
