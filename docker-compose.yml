x-common: &common
  restart: unless-stopped
  env_file: .env
  networks: [devfoundry]

services:
  backend:
    <<: *common
    build: ./backend
    ports: ["9100:9100"]
    volumes: ["./workspace:/workspace"]
    environment:
      DEVFOUNDRY_WORKSPACE: /workspace
      METAGPT_URL: http://metagpt:9101
      BOLTDIY_URL: http://boltdiy:9102
      OPENCODE_URL: http://opencode:9103
      ORC_URL: http://orc:9104
      SUPERPOWERS_URL: http://superpowers:9105
    depends_on: [metagpt, boltdiy, opencode, orc, superpowers]

  metagpt:
    <<: *common
    build: ./services/metagpt
    ports: ["9101:9101"]

  boltdiy:
    <<: *common
    build: ./services/boltdiy
    ports: ["9102:9102"]

  opencode:
    <<: *common
    build: ./services/opencode
    ports: ["9103:9103"]
    volumes: ["./workspace:/workspace"]

  orc:
    <<: *common
    build: ./services/orc
    ports: ["9104:9104"]

  superpowers:
    <<: *common
    build: ./services/superpowers
    ports: ["9105:9105"]
    volumes:
      - ./workspace:/workspace
      - /var/run/docker.sock:/var/run/docker.sock

  # Bundled web search for Deep Research — managed by DevFoundry, not external.
  searxng:
    <<: *common
    image: searxng/searxng:latest
    ports: ["8100:8080"]
    environment:
      SEARXNG_BASE_URL: http://localhost:8100/
    volumes:
      - ./services/searxng:/etc/searxng:rw

  # Bundled vector DB for RAG knowledge/memory.
  qdrant:
    <<: *common
    image: qdrant/qdrant:latest
    ports: ["6333:6333"]
    volumes:
      - ./workspace/qdrant:/qdrant/storage

networks:
  devfoundry: {}
